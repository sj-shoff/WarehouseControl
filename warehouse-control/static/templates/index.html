<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jsdiff@5.2.0/dist/diff.min.js"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-7xl mx-auto p-6">
    <!-- Language Switch -->
    <div class="flex justify-end mb-4">
      <select id="lang-switch" class="border p-2 rounded">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
    </div>
    <!-- Login Screen -->
    <div id="login" class="max-w-md mx-auto mt-32">
      <div class="bg-white rounded-3xl shadow-2xl p-10">
        <h1 class="text-4xl font-bold text-center mb-8 text-gray-800" data-i18n="title">Warehouse Control</h1>
        <input id="username" type="text" placeholder="Логин" class="w-full p-4 border border-gray-300 rounded-2xl mb-4 focus:outline-none focus:border-blue-500">
        <input id="password" type="password" placeholder="Пароль" class="w-full p-4 border border-gray-300 rounded-2xl mb-6 focus:outline-none focus:border-blue-500">
        <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition" data-i18n="login">Войти</button>
      </div>
    </div>
    <!-- Main App -->
    <div id="app" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold" data-i18n="warehouse">Склад</h1>
        <div class="flex items-center gap-6">
          <span id="current-user" class="font-medium text-gray-700"></span>
          <button onclick="logout()" class="text-red-600 hover:text-red-700 flex items-center gap-2">
            <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Выход</span>
          </button>
        </div>
      </div>
      <!-- Tabs -->
      <div class="flex border-b mb-6">
        <button onclick="switchTab(0)" class="tab active px-8 py-4 font-medium" data-tab="0" data-i18n="items">Товары</button>
        <button onclick="switchTab(1)" class="tab px-8 py-4 font-medium" data-tab="1" data-i18n="history">История</button>
      </div>
      <!-- Items Tab -->
      <div id="tab-0">
        <div class="flex gap-4 mb-6">
          <button id="add-btn" onclick="showAddModal()" class="bg-green-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
            <i class="fas fa-plus"></i> <span data-i18n="add_item">Добавить товар</span>
          </button>
          <input id="search-items" placeholder="Поиск по имени/SKU" class="border p-3 rounded-2xl w-64">
          <button onclick="loadItems()" class="bg-blue-600 text-white px-4 py-3 rounded-2xl" data-i18n="search">Поиск</button>
        </div>
        <div class="bg-white rounded-3xl shadow overflow-hidden" id="items-table"></div>
        <div class="flex justify-center mt-4" id="items-pagination"></div>
      </div>
      <!-- History Tab -->
      <div id="tab-1" class="hidden">
        <div class="bg-white p-6 rounded-3xl shadow mb-6 flex gap-4">
          <input id="history-item-id" placeholder="ID товара" class="border p-3 rounded-2xl w-40">
          <input id="history-action" placeholder="Action" class="border p-3 rounded-2xl w-40">
          <input id="history-username" placeholder="Username" class="border p-3 rounded-2xl w-40">
          <input id="history-date-from" type="date" class="border p-3 rounded-2xl w-40">
          <input id="history-date-to" type="date" class="border p-3 rounded-2xl w-40">
          <button onclick="loadHistory()" class="bg-blue-600 text-white px-8 rounded-2xl" data-i18n="show_history">Показать историю</button>
          <button onclick="exportCSV()" class="bg-orange-600 text-white px-8 rounded-2xl" data-i18n="export_csv">Экспорт CSV</button>
        </div>
        <div class="bg-white rounded-3xl shadow overflow-hidden" id="history-table"></div>
        <div class="flex justify-center mt-4" id="history-pagination"></div>
      </div>
    </div>
    <!-- Add/Edit Modal -->
    <div id="item-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
      <div class="bg-white p-8 rounded-2xl w-96">
        <h2 id="modal-title" class="text-2xl mb-4"></h2>
        <input id="item-name" placeholder="Name" class="w-full border p-2 mb-2">
        <input id="item-sku" placeholder="SKU" class="w-full border p-2 mb-2">
        <input id="item-quantity" type="number" placeholder="Quantity" class="w-full border p-2 mb-2">
        <input id="item-price" type="number" step="0.01" placeholder="Price" class="w-full border p-2 mb-2">
        <input id="item-category" placeholder="Category" class="w-full border p-2 mb-2">
        <input id="item-location" placeholder="Location" class="w-full border p-2 mb-4">
        <div class="flex gap-4">
          <button onclick="saveItem()" class="bg-green-600 text-white px-4 py-2 rounded">Save</button>
          <button onclick="closeModal()" class="bg-red-600 text-white px-4 py-2 rounded">Cancel</button>
        </div>
      </div>
    </div>
    <!-- Diff Modal -->
    <div id="diff-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
      <div class="bg-white p-8 rounded-2xl w-3/4 max-h-3/4 overflow-auto">
        <h2 class="text-2xl mb-4" data-i18n="diff_view">Diff View</h2>
        <pre id="diff-content" class="whitespace-pre-wrap"></pre>
        <button onclick="closeDiffModal()" class="bg-red-600 text-white px-4 py-2 rounded mt-4">Close</button>
      </div>
    </div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
